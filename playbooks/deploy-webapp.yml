---
- name: Deploy webapp with Cloudflare Tunnel
  hosts: local
  become: yes
  vars_files:
    - ../vars/secrets.yml
  vars:
    webapp_image: ghcr.io/snkennedy21/portfolio-webapp:latest

  tasks:
    # ============================================================
    # TIME SYNC - Fix stale clock after snapshot revert
    # ============================================================

    - name: Enable NTP time sync
      command: timedatectl set-ntp on
      changed_when: false

    - name: Restart time sync service
      systemd:
        name: systemd-timesyncd
        state: restarted

    - name: Wait for time to sync
      pause:
        seconds: 5

    # ============================================================
    # DOCKER - Container runtime
    # ============================================================

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker dependencies
      apt:
        name:
          - ca-certificates
          - gnupg
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    # ============================================================
    # NODE.JS - Runtime for Claude Code
    # ============================================================

    - name: Add NodeSource GPG key
      apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: deb https://deb.nodesource.com/node_20.x nodistro main
        state: present

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Install Claude Code globally
      npm:
        name: "@anthropic-ai/claude-code"
        global: yes
        state: present

    # ============================================================
    # CLOUDFLARE TUNNEL - Public access
    # ============================================================

    - name: Add Cloudflare GPG key
      apt_key:
        url: https://pkg.cloudflare.com/cloudflare-main.gpg
        state: present

    - name: Add Cloudflare repository
      apt_repository:
        repo: deb https://pkg.cloudflare.com/cloudflared {{ ansible_distribution_release }} main
        state: present

    - name: Install cloudflared
      apt:
        name: cloudflared
        state: present
        update_cache: yes

    - name: Install Cloudflare Tunnel service
      command: cloudflared service install {{ cloudflare_tunnel_token }}
      args:
        creates: /etc/systemd/system/cloudflared.service
      when: cloudflare_tunnel_token is defined

    - name: Enable and start Cloudflare Tunnel service
      systemd:
        name: cloudflared
        enabled: yes
        state: started
      when: cloudflare_tunnel_token is defined

    # ============================================================
    # WEBAPP - Pull and run from GitHub Container Registry
    # ============================================================

    - name: Pull webapp image from ghcr.io
      community.docker.docker_image:
        name: "{{ webapp_image }}"
        source: pull
        force_source: yes

    - name: Run webapp container
      community.docker.docker_container:
        name: webapp
        image: "{{ webapp_image }}"
        state: started
        restart_policy: unless-stopped
        pull: true
        ports:
          - "3000:3000"
        env:
          GROQ_API_KEY: "{{ groq_api_key }}"
