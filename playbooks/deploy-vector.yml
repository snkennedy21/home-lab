---
- name: Deploy Azitrax with Docker Compose
  hosts: tailscale
  become: yes
  vars_files:
    - ../vars/secrets.yml
  vars:
    azitrax_deploy_dir: /srv/azitrax
    azitrax_project_name: azitrax
    azitrax_image_tag: develop

    # Keep these image defaults until the GitHub repository/package names move.
    azitrax_backend_image: ghcr.io/snkennedy21/azitrax-backend
    azitrax_frontend_image: ghcr.io/snkennedy21/azitrax-frontend

    azitrax_public_origin: https://azitrax.com
    azitrax_cloudflare_tunnel_token: "{{ vault_azitrax_cloudflare_tunnel_token | default(azitrax_cloudflare_tunnel_token_secret | default('')) }}"
    azitrax_postgres_db: azitrax
    azitrax_postgres_user: azitrax
    azitrax_postgres_password: "{{ vault_azitrax_postgres_password | default(azitrax_postgres_password_secret | default('')) }}"

    azitrax_redis_url: redis://redis:6379/0

    azitrax_aisstream_api_key: "{{ vector_aisstream_api_key | default('') }}"
    azitrax_aisstream_ws_url: wss://stream.aisstream.io/v0/stream
    azitrax_aisstream_bounding_boxes: "[[[40.4774,-74.2591],[40.9176,-73.7004]]]"
    azitrax_aisstream_message_types: PositionReport
    azitrax_aisstream_connect_timeout_seconds: 200
    azitrax_aisstream_sample_message_limit: 50
    azitrax_aisstream_disable_tls_verify: "false"
    azitrax_ais_consumer_poll_seconds: 60
    azitrax_ais_consumer_reconnect_backoff_seconds: 5

  tasks:
    # ============================================================
    # HOST - Minimal packages needed to run Compose
    # ============================================================

    - name: Validate Azitrax deployment secrets
      assert:
        that:
          - azitrax_cloudflare_tunnel_token | length > 0
          - azitrax_aisstream_api_key | length > 0
          - azitrax_postgres_password | length > 0
          - azitrax_postgres_password != '<CHANGE_ME_STRONG_POSTGRES_PASSWORD>'
        fail_msg: >-
          Define azitrax_cloudflare_tunnel_token_secret, vector_aisstream_api_key, and
          vault_azitrax_postgres_password or azitrax_postgres_password_secret
          in ../vars/secrets.yml before deploying Azitrax.
      no_log: true

    - name: Install Azitrax deployment dependencies
      apt:
        name:
          - python3-docker
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Check for legacy Vector deploy directory
      stat:
        path: /srv/vector/compose.yaml
      register: legacy_vector_compose

    - name: Stop legacy Vector compose stack
      command: docker compose --project-name vector down --remove-orphans
      args:
        chdir: /srv/vector
      when: legacy_vector_compose.stat.exists

    # ============================================================
    # AZITRAX - Render production Compose and environment
    # ============================================================

    - name: Create Azitrax deploy directory
      file:
        path: "{{ azitrax_deploy_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy Azitrax nginx gateway config
      copy:
        src: ../../azitrax/deploy/nginx/gateway.conf
        dest: "{{ azitrax_deploy_dir }}/nginx.conf"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      register: azitrax_nginx_config

    - name: Copy Azitrax production Compose file
      copy:
        src: ../../azitrax/compose.prod.yaml
        dest: "{{ azitrax_deploy_dir }}/compose.yaml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Write Azitrax environment file
      copy:
        dest: "{{ azitrax_deploy_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
        content: |
          COMPOSE_PROJECT_NAME={{ azitrax_project_name }}
          AZITRAX_IMAGE_TAG={{ azitrax_image_tag }}
          AZITRAX_BACKEND_IMAGE={{ azitrax_backend_image }}
          AZITRAX_FRONTEND_IMAGE={{ azitrax_frontend_image }}

          CLOUDFLARED_TUNNEL_TOKEN={{ azitrax_cloudflare_tunnel_token }}

          POSTGRES_DB={{ azitrax_postgres_db }}
          POSTGRES_HOST=db
          POSTGRES_USER={{ azitrax_postgres_user }}
          POSTGRES_PASSWORD={{ azitrax_postgres_password }}
          POSTGRES_PORT=5432
          POSTGRES_CONNECT_TIMEOUT=5
          POSTGRES_POOL_MIN_SIZE=1
          POSTGRES_POOL_MAX_SIZE=5
          POSTGRES_POOL_TIMEOUT=5

          REDIS_URL={{ azitrax_redis_url }}
          FRONTEND_ORIGINS={{ azitrax_public_origin }}

          AISSTREAM_WS_URL={{ azitrax_aisstream_ws_url }}
          AISSTREAM_API_KEY={{ azitrax_aisstream_api_key }}
          AISSTREAM_BOUNDING_BOXES={{ azitrax_aisstream_bounding_boxes }}
          AISSTREAM_MESSAGE_TYPES={{ azitrax_aisstream_message_types }}
          AISSTREAM_CONNECT_TIMEOUT_SECONDS={{ azitrax_aisstream_connect_timeout_seconds }}
          AISSTREAM_SAMPLE_MESSAGE_LIMIT={{ azitrax_aisstream_sample_message_limit }}
          AISSTREAM_DISABLE_TLS_VERIFY={{ azitrax_aisstream_disable_tls_verify }}
          AIS_CONSUMER_POLL_SECONDS={{ azitrax_ais_consumer_poll_seconds }}
          AIS_CONSUMER_RECONNECT_BACKOFF_SECONDS={{ azitrax_ais_consumer_reconnect_backoff_seconds }}

          VITE_API_BASE_URL=/api
          VITE_API_PROXY_TARGET=http://backend:8000
      no_log: true

    # ============================================================
    # COMPOSE - Pull and run the Azitrax stack
    # ============================================================

    - name: Log in to GitHub Container Registry
      command: docker login ghcr.io --username {{ vector_ghcr_username }} --password-stdin
      args:
        stdin: "{{ vector_ghcr_token }}"
      changed_when: false
      no_log: true
      when:
        - vector_ghcr_username is defined
        - vector_ghcr_token is defined

    - name: Pull Azitrax container images
      command: docker compose --project-name {{ azitrax_project_name }} pull
      args:
        chdir: "{{ azitrax_deploy_dir }}"
      register: azitrax_compose_pull
      changed_when: "'Downloaded newer image' in azitrax_compose_pull.stdout or 'Pulled' in azitrax_compose_pull.stdout"

    - name: Start Azitrax containers
      command: docker compose --project-name {{ azitrax_project_name }} up -d --remove-orphans
      args:
        chdir: "{{ azitrax_deploy_dir }}"
      register: azitrax_compose_up
      changed_when: "'Started' in azitrax_compose_up.stdout or 'Created' in azitrax_compose_up.stdout or 'Recreated' in azitrax_compose_up.stdout"

    - name: Restart Azitrax nginx when gateway config changes
      command: docker compose --project-name {{ azitrax_project_name }} restart nginx
      args:
        chdir: "{{ azitrax_deploy_dir }}"
      when: azitrax_nginx_config.changed

    - name: Wait for Azitrax API health check inside backend container
      command: >-
        docker compose --project-name {{ azitrax_project_name }} exec -T backend
        python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
      args:
        chdir: "{{ azitrax_deploy_dir }}"
      register: azitrax_health
      retries: 12
      delay: 5
      until: azitrax_health.rc == 0
      changed_when: false
